document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:block;font:500 15px Archivo,sans-serif;color:#5f5749;margin-bottom:10px;\">Enter your name to open your case file. (It will appear on your final report.)<\u002Flabel>\n            <input id=\"hda-name\" type=\"text\" value=\"{{ name }}\" onchange=\"{{ setName }}\" placeholder=\"Your full name\" autocomplete=\"off\" style=\"width:100%;padding:14px 16px;border:1.5px solid #d3c8af;border-radius:5px;background:#fff;font:500 18px Archivo,sans-serif;color:#23201a;\">\n            <sc-if value=\"{{ nameError }}\">\n              <div style=\"margin-top:8px;font:500 14px Archivo,sans-serif;color:#9c3b2e;\">⚠ {{ nameError }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <button onclick=\"{{ beginGame }}\" style=\"margin-top:20px;width:100%;padding:16px;border:none;border-radius:5px;background:#a9772e;color:#fff;font:700 17px Archivo,sans-serif;letter-spacing:.02em;cursor:pointer;\">Begin Investigation ▸<\u002Fbutton>\n\n            <div style=\"margin-top:26px;padding-top:22px;border-top:1px solid #e7ddc5;display:flex;flex-wrap:wrap;gap:10px;align-items:center;\">\n              <span style=\"font:600 11px Space Mono,monospace;letter-spacing:.16em;color:#9a8f78;text-transform:uppercase;margin-right:4px;\">Access<\u002Fspan>\n              <button onclick=\"{{ toggleReduce }}\" style=\"{{ reduceBtnStyle }}\">◐ {{ reduceLabel }}<\u002Fbutton>\n              <button onclick=\"{{ toggleLarge }}\" style=\"{{ largeBtnStyle }}\">A⁺ {{ largeLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n            <p style=\"margin:16px 0 0;font:400 12.5px/1.5 Archivo,sans-serif;color:#9a8f78;\">About 15–20 minutes · 6 cases · keyboard-friendly. Your teacher can download a results file at the end.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== PLAY ===================== -->\n    <sc-if value=\"{{ showPlay }}\">\n      <div style=\"width:100%;display:flex;flex-direction:column;min-height:100vh;\">\n\n        <!-- top bar -->\n        <div style=\"position:sticky;top:0;z-index:5;background:rgba(231,221,203,.92);backdrop-filter:blur(6px);border-bottom:1px solid #d5cab2;padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n          <div style=\"display:flex;align-items:center;gap:9px;\">\n            <div style=\"width:18px;height:18px;background:#a9772e;transform:rotate(45deg);\"><\u002Fdiv>\n            <span style=\"font:700 11px Space Mono,monospace;letter-spacing:.14em;color:#5f5749;text-transform:uppercase;\">{{ caseLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:120px;display:flex;flex-direction:column;gap:5px;\">\n            <div style=\"display:flex;justify-content:space-between;font:600 10.5px Space Mono,monospace;color:#8a7f68;letter-spacing:.08em;\"><span>{{ progressLabel }}<\u002Fspan><span>{{ rankTitle }} · {{ scoreNow }} pts<\u002Fspan><\u002Fdiv>\n            <div style=\"height:5px;background:#d5cab2;border-radius:3px;overflow:hidden;\"><div style=\"height:100%;background:#a9772e;border-radius:3px;width:{{ progressPct }};transition:width .4s ease;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:7px;\">\n            <button onclick=\"{{ toggleReduce }}\" aria-label=\"Toggle reduced motion\" style=\"{{ reduceMiniStyle }}\">◐<\u002Fbutton>\n            <button onclick=\"{{ toggleLarge }}\" aria-label=\"Toggle large text\" style=\"{{ largeMiniStyle }}\">A⁺<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;padding:30px 26px 40px;width:100%;\">\n          <div style=\"max-width:680px;margin:0 auto;\">\n\n            <!-- CASE INTRO -->\n            <sc-if value=\"{{ isCaseIntro }}\">\n              <div class=\"hda-anim\" style=\"text-align:center;padding:30px 10px;\">\n                <div style=\"font:600 90px/1 Spectral,serif;color:#cdbf9f;\">{{ ciIcon }}<\u002Fdiv>\n                <div style=\"font:700 12px Space Mono,monospace;letter-spacing:.28em;color:#a9772e;text-transform:uppercase;margin-top:10px;\">Case {{ ciNum }} · {{ ciSkill }}<\u002Fdiv>\n                <h2 style=\"margin:8px 0 16px;font:600 36px/1.05 Spectral,serif;\">{{ ciTitle }}<\u002Fh2>\n                <p style=\"max-width:480px;margin:0 auto;font:400 18px/1.6 Spectral,serif;color:#4a4438;\">{{ ciBlurb }}<\u002Fp>\n                <div style=\"margin-top:20px;display:inline-flex;align-items:center;gap:10px;background:#faf6ec;border:1px solid #e2d8c0;border-radius:999px;padding:8px 16px;\">\n                  <span style=\"width:22px;height:22px;border-radius:50%;background:#211d17;color:#b8842f;display:flex;align-items:center;justify-content:center;font:700 12px Spectral,serif;\">{{ mentorInitial }}<\u002Fspan>\n                  <span style=\"font:italic 400 14px Spectral,serif;color:#6b6253;\">{{ mentorName }}, Chief Curator<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"margin-top:26px;display:flex;justify-content:center;\">\n                  <sc-if value=\"{{ isCase01 }}\"><svg viewBox=\"0 0 80 80\" width=\"80\" height=\"80\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"40\" cy=\"40\" r=\"34\" fill=\"#c4a46a\" stroke=\"#7a5820\" stroke-width=\"2.5\"><\u002Fcircle><circle cx=\"40\" cy=\"40\" r=\"26\" fill=\"#b89450\" stroke=\"#7a5820\" stroke-width=\"1.5\"><\u002Fcircle><line x1=\"40\" y1=\"8\" x2=\"40\" y2=\"18\" stroke=\"#4a3010\" stroke-width=\"2.5\"><\u002Fline><line x1=\"40\" y1=\"62\" x2=\"40\" y2=\"72\" stroke=\"#4a3010\" stroke-width=\"2.5\"><\u002Fline><line x1=\"8\" y1=\"40\" x2=\"18\" y2=\"40\" stroke=\"#4a3010\" stroke-width=\"2.5\"><\u002Fline><line x1=\"62\" y1=\"40\" x2=\"72\" y2=\"40\" stroke=\"#4a3010\" stroke-width=\"2.5\"><\u002Fline><line x1=\"16\" y1=\"16\" x2=\"23\" y2=\"23\" stroke=\"#4a3010\" stroke-width=\"2\"><\u002Fline><line x1=\"64\" y1=\"16\" x2=\"57\" y2=\"23\" stroke=\"#4a3010\" stroke-width=\"2\"><\u002Fline><line x1=\"16\" y1=\"64\" x2=\"23\" y2=\"57\" stroke=\"#4a3010\" stroke-width=\"2\"><\u002Fline><line x1=\"64\" y1=\"64\" x2=\"57\" y2=\"57\" stroke=\"#4a3010\" stroke-width=\"2\"><\u002Fline><line x1=\"40\" y1=\"40\" x2=\"54\" y2=\"24\" stroke=\"#3a2010\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fline><circle cx=\"40\" cy=\"40\" r=\"4\" fill=\"#3a2010\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ isCase02 }}\"><svg viewBox=\"0 0 80 80\" width=\"80\" height=\"80\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"18\" y=\"20\" width=\"44\" height=\"40\" fill=\"#d4b87a\" stroke=\"#9a7040\" stroke-width=\"1.5\"><\u002Frect><ellipse cx=\"40\" cy=\"20\" rx=\"22\" ry=\"7\" fill=\"#b89450\" stroke=\"#8a6030\" stroke-width=\"1.5\"><\u002Fellipse><ellipse cx=\"40\" cy=\"60\" rx=\"22\" ry=\"7\" fill=\"#b89450\" stroke=\"#8a6030\" stroke-width=\"1.5\"><\u002Fellipse><line x1=\"26\" y1=\"30\" x2=\"54\" y2=\"30\" stroke=\"#7a5020\" stroke-width=\"1.5\"><\u002Fline><line x1=\"26\" y1=\"37\" x2=\"54\" y2=\"37\" stroke=\"#7a5020\" stroke-width=\"1.5\"><\u002Fline><line x1=\"26\" y1=\"44\" x2=\"46\" y2=\"44\" stroke=\"#7a5020\" stroke-width=\"1.5\"><\u002Fline><line x1=\"26\" y1=\"51\" x2=\"50\" y2=\"51\" stroke=\"#7a5020\" stroke-width=\"1.5\"><\u002Fline><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ isCase03 }}\"><svg viewBox=\"0 0 80 80\" width=\"80\" height=\"80\" xmlns=\"http://www.w3.org/2000/svg\"><rect x=\"8\" y=\"12\" width=\"64\" height=\"56\" rx=\"5\" fill=\"#d4a860\" opacity=\".2\" stroke=\"#8a6028\" stroke-width=\"3.5\"><\u002Frect><line x1=\"8\" y1=\"34\" x2=\"72\" y2=\"34\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fline><line x1=\"8\" y1=\"52\" x2=\"72\" y2=\"52\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fline><circle cx=\"22\" cy=\"34\" r=\"7\" fill=\"#c4903a\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fcircle><circle cx=\"40\" cy=\"34\" r=\"7\" fill=\"#c4903a\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fcircle><circle cx=\"58\" cy=\"34\" r=\"7\" fill=\"#c4903a\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fcircle><circle cx=\"22\" cy=\"52\" r=\"7\" fill=\"#c4903a\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fcircle><circle cx=\"40\" cy=\"52\" r=\"7\" fill=\"#c4903a\" stroke=\"#8a6028\" stroke-width=\"1.5\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ isCase04 }}\"><svg viewBox=\"0 0 80 80\" width=\"80\" height=\"80\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"40\" cy=\"40\" r=\"34\" fill=\"#8c3428\" stroke=\"#6a2818\" stroke-width=\"2.5\"><\u002Fcircle><circle cx=\"40\" cy=\"40\" r=\"28\" fill=\"none\" stroke=\"#c06050\" stroke-width=\"1.5\"><\u002Fcircle><circle cx=\"40\" cy=\"40\" r=\"20\" fill=\"#7a2c22\" stroke=\"#6a2818\" stroke-width=\"1\"><\u002Fcircle><line x1=\"40\" y1=\"24\" x2=\"40\" y2=\"56\" stroke=\"#f0c8b8\" stroke-width=\"2\"><\u002Fline><line x1=\"24\" y1=\"40\" x2=\"56\" y2=\"40\" stroke=\"#f0c8b8\" stroke-width=\"2\"><\u002Fline><line x1=\"28.7\" y1=\"28.7\" x2=\"51.3\" y2=\"51.3\" stroke=\"#f0c8b8\" stroke-width=\"1.5\"><\u002Fline><line x1=\"51.3\" y1=\"28.7\" x2=\"28.7\" y2=\"51.3\" stroke=\"#f0c8b8\" stroke-width=\"1.5\"><\u002Fline><circle cx=\"40\" cy=\"40\" r=\"5\" fill=\"#f0c8b8\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ isCase05 }}\"><svg viewBox=\"0 0 80 80\" width=\"80\" height=\"80\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"32\" cy=\"30\" r=\"20\" fill=\"rgba(196,164,106,.25)\" stroke=\"#8a6028\" stroke-width=\"4\"><\u002Fcircle><circle cx=\"32\" cy=\"30\" r=\"16\" fill=\"rgba(240,220,180,.3)\"><\u002Fcircle><circle cx=\"27\" cy=\"25\" r=\"5\" fill=\"rgba(255,255,255,.3)\"><\u002Fcircle><line x1=\"46\" y1=\"44\" x2=\"68\" y2=\"66\" stroke=\"#8a6028\" stroke-width=\"8\" stroke-linecap=\"round\"><\u002Fline><line x1=\"46\" y1=\"44\" x2=\"68\" y2=\"66\" stroke=\"#c4a046\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ isCase06 }}\"><svg viewBox=\"0 0 80 80\" width=\"80\" height=\"80\" xmlns=\"http://www.w3.org/2000/svg\"><polygon points=\"40,6 49,30 74,30 54,46 62,70 40,54 18,70 26,46 6,30 31,30\" fill=\"#c4a030\" stroke=\"#8a7020\" stroke-width=\"2\"><\u002Fpolygon><polygon points=\"40,6 49,30 74,30 54,46 62,70 40,54 18,70 26,46 6,30 31,30\" fill=\"none\" stroke=\"#e8c840\" stroke-width=\"1\" opacity=\".6\"><\u002Fpolygon><circle cx=\"40\" cy=\"40\" r=\"12\" fill=\"#a07020\" stroke=\"#8a6010\" stroke-width=\"1.5\"><\u002Fcircle><circle cx=\"40\" cy=\"40\" r=\"9\" fill=\"none\" stroke=\"#e8c840\" stroke-width=\"1.5\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- shared prompt header for tasks -->\n            <sc-if value=\"{{ showTaskHeader }}\">\n              <div class=\"hda-anim\" style=\"margin-bottom:22px;\">\n                <div style=\"font:700 11px Space Mono,monospace;letter-spacing:.2em;color:#a9772e;text-transform:uppercase;\">{{ caseLabel }}<\u002Fdiv>\n                <sc-if value=\"{{ hasClaim }}\">\n                  <div style=\"margin-top:12px;background:#211d17;color:#f1ead9;border-radius:6px;padding:16px 18px;font:500 15.5px/1.5 Spectral,serif;\">{{ claim }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <h2 style=\"margin:12px 0 0;font:600 25px/1.3 Spectral,serif;\">{{ prompt }}<\u002Fh2>\n                <sc-if value=\"{{ isNumberline }}\">\n                  <p style=\"margin:8px 0 0;font:500 16px Archivo,sans-serif;color:#5f5749;\">Artifact: <strong>{{ event }}<\u002Fstrong> — dated <strong style=\"color:#a9772e;\">{{ eventYear }}<\u002Fstrong><\u002Fp>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- NUMBER LINE -->\n            <sc-if value=\"{{ isNumberline }}\">\n              <div class=\"hda-anim\" style=\"background:#faf6ec;border:1px solid #e2d8c0;border-radius:8px;padding:26px 22px 18px;\">\n                <div style=\"text-align:center;margin-bottom:22px;\">\n                  <div style=\"font:600 11px Space Mono,monospace;letter-spacing:.16em;color:#9a8f78;text-transform:uppercase;\">Pin placed at<\u002Fdiv>\n                  <div style=\"font:600 26px/1.1 Spectral,serif;color:{{ pinLabelColor }};margin-top:6px;\">{{ pinLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div onmousedown=\"{{ nlMouseDown }}\" ontouchstart=\"{{ nlTouchStart }}\" ontouchmove=\"{{ nlTouchMove }}\" onkeydown=\"{{ nlKeyDown }}\" tabindex=\"0\" role=\"button\" aria-label=\"{{ nlAriaLabel }}\" style=\"position:relative;height:96px;cursor:crosshair;user-select:none;-webkit-user-select:none;touch-action:none;border-radius:4px;\">\n                  <div style=\"position:absolute;top:42px;left:0;width:{{ zeroPct }};height:8px;background:rgba(156,59,46,.09);pointer-events:none;\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:42px;left:{{ zeroPct }};right:0;height:8px;background:rgba(59,110,156,.09);pointer-events:none;\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:44px;left:0;right:0;height:4px;background:#ddd2b8;border-radius:2px;pointer-events:none;\"><\u002Fdiv>\n                  <div style=\"position:absolute;left:{{ zeroPct }};top:26px;width:2px;height:34px;background:#211d17;transform:translateX(-50%);pointer-events:none;\"><\u002Fdiv>\n                  <div style=\"position:absolute;left:{{ zeroPct }};top:63px;transform:translateX(-50%);white-space:nowrap;font:700 9px Space Mono,monospace;color:#211d17;pointer-events:none;\">Year 1<\u002Fdiv>\n                  <sc-for list=\"{{ nlTicks }}\" as=\"tick\" hint-placeholder-count=\"9\">\n                    <div style=\"{{ tick.wrapStyle }}\">\n                      <div style=\"{{ tick.lineStyle }}\"><\u002Fdiv>\n                      <div style=\"{{ tick.labelStyle }}\">{{ tick.label }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <div style=\"position:absolute;top:22px;left:8px;font:700 10px Space Mono,monospace;color:#9c3b2e;letter-spacing:.1em;pointer-events:none;\">◀ BCE<\u002Fdiv>\n                  <div style=\"position:absolute;top:22px;right:8px;font:700 10px Space Mono,monospace;color:#3b6e9c;letter-spacing:.1em;pointer-events:none;\">CE ▶<\u002Fdiv>\n                  <sc-if value=\"{{ hasPin }}\">\n                    <div style=\"position:absolute;top:5px;left:{{ pinPct }};transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;\">\n                      <div style=\"width:16px;height:16px;background:#a9772e;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(100,60,10,.45);\"><\u002Fdiv>\n                      <div style=\"width:2px;height:26px;background:#a9772e;margin-top:-2px;\"><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;font:700 10px Space Mono,monospace;color:#b8a98c;margin-top:8px;padding:0 2px;\"><span>{{ leftLabel }}<\u002Fspan><span>{{ rightLabel }}<\u002Fspan><\u002Fdiv>\n                <p style=\"margin:12px 0 0;font:400 13px/1.5 Archivo,sans-serif;color:#9a8f78;\">Click the timeline to get close, then use ← → arrow keys to fine-tune (5 years per step). You need to be within 5 years.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ORDER -->\n            <sc-if value=\"{{ isOrder }}\">\n              <div class=\"hda-anim\">\n                <sc-for list=\"{{ orderItems }}\" as=\"row\" hint-placeholder-count=\"4\">\n                  <div style=\"{{ row.rowStyle }}\">\n                    <span style=\"font:700 13px Space Mono,monospace;color:#a9772e;width:20px;flex:none;\">{{ row.pos }}<\u002Fspan>\n                    <span style=\"flex:1;font:500 17px/1.35 Spectral,serif;color:#23201a;\">{{ row.label }}<\u002Fspan>\n                    <span style=\"font:700 12px Space Mono,monospace;color:#6b8a63;flex:none;\">{{ row.revealYear }}<\u002Fspan>\n                    <div style=\"display:flex;flex-direction:column;gap:4px;flex:none;\">\n                      <button onclick=\"{{ row.up }}\" disabled=\"{{ row.upDisabled }}\" aria-label=\"Move earlier\" style=\"{{ row.upStyle }}\">▲<\u002Fbutton>\n                      <button onclick=\"{{ row.down }}\" disabled=\"{{ row.downDisabled }}\" aria-label=\"Move later\" style=\"{{ row.downStyle }}\">▼<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- MULTIPLE CHOICE (gap + evidence) -->\n            <sc-if value=\"{{ isMC }}\">\n              <div class=\"hda-anim\" style=\"display:flex;flex-direction:column;gap:11px;\">\n                <sc-for list=\"{{ mcOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ opt.onClick }}\" disabled=\"{{ opt.disabled }}\" style=\"{{ opt.style }}\">\n                    <span style=\"{{ opt.markStyle }}\">{{ opt.mark }}<\u002Fspan>\n                    <span style=\"flex:1;\">{{ opt.label }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- SORT -->\n            <sc-if value=\"{{ isSort }}\">\n              <div class=\"hda-anim\" style=\"display:flex;flex-direction:column;gap:12px;\">\n                <sc-for list=\"{{ sortCards }}\" as=\"card\" hint-placeholder-count=\"4\">\n                  <div style=\"{{ card.cardStyle }}\">\n                    <div style=\"flex:1;min-width:0;\">\n                      <div style=\"font:600 17px/1.3 Spectral,serif;color:#23201a;display:flex;align-items:center;gap:8px;\"><span style=\"{{ card.markStyle }}\">{{ card.mark }}<\u002Fspan>{{ card.label }}<\u002Fdiv>\n                      <div style=\"font:400 13.5px/1.45 Archivo,sans-serif;color:#7d7363;margin-top:3px;\">{{ card.sub }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;gap:8px;flex:none;\">\n                      <button onclick=\"{{ card.onPrimary }}\" style=\"{{ card.primaryStyle }}\">Primary<\u002Fbutton>\n                      <button onclick=\"{{ card.onSecondary }}\" style=\"{{ card.secondaryStyle }}\">Secondary<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- WRITTEN -->\n            <sc-if value=\"{{ isWritten }}\">\n              <div class=\"hda-anim\">\n                <textarea value=\"{{ writtenValue }}\" onchange=\"{{ setWritten }}\" rows=\"5\" placeholder=\"Write your ruling here…\" style=\"width:100%;padding:15px 16px;border:1.5px solid #d3c8af;border-radius:6px;background:#fff;font:400 16px/1.5 Spectral,serif;color:#23201a;resize:vertical;\"><\u002Ftextarea>\n                <sc-if value=\"{{ writtenSubmitted }}\">\n                  <div style=\"margin-top:18px;background:#faf6ec;border:1px solid #e2d8c0;border-radius:6px;padding:18px;\">\n                    <div style=\"font:700 11px Space Mono,monospace;letter-spacing:.18em;color:#a9772e;text-transform:uppercase;margin-bottom:8px;\">Curator’s model answer<\u002Fdiv>\n                    <p style=\"margin:0;font:400 15.5px/1.6 Spectral,serif;color:#3f3a30;\">{{ writtenModel }}<\u002Fp>\n                    <sc-if value=\"{{ notRated }}\">\n                      <div style=\"margin-top:16px;font:600 14px Archivo,sans-serif;color:#5f5749;\">How did your answer compare?<\u002Fdiv>\n                      <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:10px;\">\n                        <button onclick=\"{{ rateGot }}\" style=\"padding:10px 16px;border-radius:999px;border:1.5px solid #4f7a52;background:#fff;color:#3c5e40;font:600 14px Archivo,sans-serif;cursor:pointer;\">✓ I covered the key ideas<\u002Fbutton>\n                        <button onclick=\"{{ ratePartly }}\" style=\"padding:10px 16px;border-radius:999px;border:1.5px solid #a9772e;background:#fff;color:#8a5f1f;font:600 14px Archivo,sans-serif;cursor:pointer;\">◑ Partly<\u002Fbutton>\n                        <button onclick=\"{{ rateNot }}\" style=\"padding:10px 16px;border-radius:999px;border:1.5px solid #b58a82;background:#fff;color:#8a4034;font:600 14px Archivo,sans-serif;cursor:pointer;\">○ Not yet<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ showWrittenSubmit }}\">\n                  <button onclick=\"{{ submitWritten }}\" style=\"margin-top:16px;padding:13px 26px;border:none;border-radius:5px;background:#211d17;color:#f4eee0;font:600 16px Archivo,sans-serif;cursor:pointer;\">Submit ruling ▸<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- FEEDBACK -->\n            <sc-if value=\"{{ fbCorrect }}\">\n              <div class=\"hda-anim\" style=\"margin-top:20px;background:#e9f1e6;border:1px solid #b9d2b3;border-radius:6px;padding:16px 18px;display:flex;gap:13px;\">\n                <span style=\"width:26px;height:26px;flex:none;border-radius:50%;background:#4f7a52;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;\">✓<\u002Fspan>\n                <div><div style=\"font:700 15px Archivo,sans-serif;color:#2f5a36;\">{{ fbTitle }}<\u002Fdiv><p style=\"margin:5px 0 0;font:400 15px/1.55 Spectral,serif;color:#3f5640;\">{{ fbBody }}<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ fbWrong }}\">\n              <div class=\"hda-anim\" style=\"margin-top:20px;background:#f6e8e3;border:1px solid #ddb6ab;border-radius:6px;padding:16px 18px;display:flex;gap:13px;\">\n                <span style=\"width:26px;height:26px;flex:none;border-radius:50%;background:#9c3b2e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;\">↻<\u002Fspan>\n                <div><div style=\"font:700 15px Archivo,sans-serif;color:#8a3528;\">{{ fbTitle }}<\u002Fdiv><p style=\"margin:5px 0 0;font:400 15px/1.55 Spectral,serif;color:#6e3a30;\">{{ fbBody }}<\u002Fp><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- CONTROLS -->\n            <div style=\"margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;\">\n              <sc-if value=\"{{ showCheck }}\">\n                <button onclick=\"{{ checkHandler }}\" style=\"padding:14px 30px;border:none;border-radius:5px;background:#a9772e;color:#fff;font:700 16px Archivo,sans-serif;letter-spacing:.01em;cursor:pointer;\">{{ checkLabel }}<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ showContinue }}\">\n                <button onclick=\"{{ continueStep }}\" style=\"padding:14px 30px;border:none;border-radius:5px;background:#211d17;color:#f4eee0;font:700 16px Archivo,sans-serif;letter-spacing:.01em;cursor:pointer;\">{{ continueLabel }}<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== RESULTS ===================== -->\n    <sc-if value=\"{{ showResults }}\">\n      <div class=\"hda-anim\" style=\"width:100%;padding:42px 26px 70px;\">\n        <div style=\"max-width:700px;margin:0 auto;\">\n          <div style=\"background:#211d17;color:#f4eee0;border-radius:8px;padding:38px 34px;text-align:center;\">\n            <div style=\"font:700 12px Space Mono,monospace;letter-spacing:.3em;color:#b8842f;text-transform:uppercase;\">Case closed · Report filed<\u002Fdiv>\n            <h1 style=\"margin:12px 0 4px;font:600 34px Spectral,serif;\">Detective {{ studentName }}<\u002Fh1>\n            <div style=\"display:inline-block;margin-top:10px;padding:9px 22px;border:1.5px solid #b8842f;border-radius:999px;font:600 18px Spectral,serif;color:#e7c684;\">{{ rankTitle }}<\u002Fdiv>\n            <div style=\"display:flex;justify-content:center;gap:36px;margin-top:26px;flex-wrap:wrap;\">\n              <div><div style=\"font:600 32px Spectral,serif;color:#f4eee0;\">{{ scoreNow }}<span style=\"font-size:16px;color:#9a8f78;\"> / {{ scoreMax }}<\u002Fspan><\u002Fdiv><div style=\"font:600 10.5px Space Mono,monospace;letter-spacing:.16em;color:#9a8f78;text-transform:uppercase;margin-top:3px;\">Score · {{ scorePct }}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font:600 32px Spectral,serif;color:#f4eee0;\">{{ timeStr }}<\u002Fdiv><div style=\"font:600 10.5px Space Mono,monospace;letter-spacing:.16em;color:#9a8f78;text-transform:uppercase;margin-top:3px;\">Time on case<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <h2 style=\"margin:34px 0 14px;font:600 21px Spectral,serif;\">Field Badges<\u002Fh2>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;\">\n            <sc-for list=\"{{ badges }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div style=\"background:#faf6ec;border:1px solid #e2d8c0;border-radius:8px;padding:16px;text-align:center;\">\n                <div style=\"font:600 40px/1 Spectral,serif;color:#cdbf9f;\">{{ b.icon }}<\u002Fdiv>\n                <div style=\"margin-top:9px;font:600 14px/1.25 Spectral,serif;color:#23201a;\">{{ b.title }}<\u002Fdiv>\n                <div style=\"display:inline-block;margin-top:8px;padding:3px 12px;border:1.5px solid;border-radius:999px;font:700 10.5px Space Mono,monospace;letter-spacing:.12em;text-transform:uppercase;{{ b.tierStyle }}\">{{ b.tier }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <h2 style=\"margin:34px 0 14px;font:600 21px Spectral,serif;\">Skill Report<\u002Fh2>\n          <div style=\"background:#faf6ec;border:1px solid #e2d8c0;border-radius:8px;padding:20px 22px;\">\n            <sc-for list=\"{{ skills }}\" as=\"sk\" hint-placeholder-count=\"6\">\n              <div style=\"margin-bottom:15px;\">\n                <div style=\"display:flex;justify-content:space-between;font:600 14px Archivo,sans-serif;color:#3f3a30;margin-bottom:6px;\"><span>{{ sk.label }}<\u002Fspan><span style=\"font:700 12px Space Mono,monospace;color:#7d7363;\">{{ sk.scoreStr }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:8px;background:#e7ddc5;border-radius:4px;overflow:hidden;\"><div style=\"height:100%;background:#a9772e;border-radius:4px;width:{{ sk.barWidth }};\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:30px;display:flex;gap:12px;flex-wrap:wrap;\">\n            <button onclick=\"{{ exportCSV }}\" style=\"padding:15px 28px;border:none;border-radius:5px;background:#a9772e;color:#fff;font:700 16px Archivo,sans-serif;cursor:pointer;\">⬇ Download results (CSV)<\u002Fbutton>\n            <button onclick=\"{{ restart }}\" style=\"padding:15px 28px;border:1.5px solid #c3b794;border-radius:5px;background:transparent;color:#5f5749;font:700 16px Archivo,sans-serif;cursor:pointer;\">↻ Play again<\u002Fbutton>\n          <\u002Fdiv>\n          <p style=\"margin:18px 0 0;font:400 13px/1.55 Archivo,sans-serif;color:#9a8f78;\">Teacher note: the CSV holds the student name, rank, score, time, per-skill breakdown, attempts per question, and the written response — ready to open in Google Sheets or import to your gradebook.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:680},&quot;academyName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Historical Skills&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;mentorName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Dr. Vale&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startInLargeText&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.flow = [\n      {kind:'caseIntro', num:'01', skill:'Dating', title:'Reading the Calendar', icon:'◴',\n       blurb:'Before we sort anything, you must read the dates. Ancient records use BCE and CE. Place each artifact where its year belongs on the timeline.'},\n      {kind:'numberline', id:'nl1', skill:'Dating', target:-776, tol:5, min:-3200, max:1500,\n       event:'The first Olympic Games', year:'776 BCE',\n       prompt:'Drag the pin to where 776 BCE sits on the timeline.',\n       teach:'BCE years count DOWN toward year 1, so a larger BCE number means longer ago. 776 BCE sits on the LEFT (BCE) side of the line.',\n       hint:'776 BCE comes before the CE era — keep the pin on the left (BCE) side.'},\n      {kind:'numberline', id:'nl2', skill:'Dating', target:476, tol:5, min:-3200, max:1500,\n       event:'The fall of the Western Roman Empire', year:'476 CE',\n       prompt:'Drag the pin to where 476 CE belongs.',\n       teach:'CE years count UP, away from year 1. 476 CE is only a few centuries into the era, so it sits just to the RIGHT of the year-1 marker.',\n       hint:'CE dates are on the right side of the line, and 476 is small — stay close to the year-1 marker.'},\n      {kind:'numberline', id:'nl3', skill:'Dating', target:-1754, tol:5, min:-3200, max:1500,\n       event:'Hammurabi’s Code of laws', year:'1754 BCE',\n       prompt:'Drag the pin to where 1754 BCE belongs.',\n       teach:'1754 BCE is earlier than 776 BCE. Bigger BCE numbers sit further LEFT and further in the past.',\n       hint:'This is a large BCE number, so it belongs far to the left — earlier than the Olympics.'},\n      {kind:'numberline', id:'nl4', skill:'Dating', target:-480, tol:5, min:-3200, max:1500,\n       event:'The Battle of Thermopylae', year:'480 BCE',\n       prompt:'Drag the pin to where 480 BCE sits on the timeline.',\n       teach:'480 BCE is a smaller BCE number than 776 BCE, so it sits further RIGHT — closer to Year 1 — on the BCE side.',\n       hint:'Compare 480 to 776. Which number is smaller? On the BCE side, smaller numbers sit closer to Year 1.'},\n      {kind:'numberline', id:'nl5', skill:'Dating', target:800, tol:5, min:-3200, max:1500,\n       event:'Charlemagne is crowned Holy Roman Emperor', year:'800 CE',\n       prompt:'Drag the pin to where 800 CE belongs.',\n       teach:'800 CE is on the right (CE) side and further from Year 1 than 476 CE — larger CE numbers sit further right.',\n       hint:'800 CE is on the right side of Year 1. Is it closer to or further from Year 1 than 476 CE?'},\n\n      {kind:'caseIntro', num:'02', skill:'Sequencing', title:'Restore the Timeline', icon:'⇅',\n       blurb:'The storm scrambled the gallery walls. Put each set of events back in order — oldest at the top, most recent at the bottom.'},\n      {kind:'order', id:'ord1', skill:'Sequencing',\n       prompt:'Arrange these from OLDEST (top) to MOST RECENT (bottom).',\n       items:[{label:'First cities rise in Sumer', year:-3200},{label:'The Great Pyramid of Giza is built', year:-2560},{label:'The first Olympic Games', year:-776},{label:'The Western Roman Empire falls', year:476}],\n       teach:'Oldest events have the largest BCE numbers; CE events come last. Sumer’s cities (3200 BCE) come long before Rome’s fall (476 CE).',\n       hint:'Start with the largest BCE number — that is the oldest. CE events go at the bottom.'},\n      {kind:'order', id:'ord2', skill:'Sequencing', reverse:true,\n       prompt:'Arrange these from MOST RECENT (top) to OLDEST (bottom).',\n       items:[{label:'Hammurabi’s Code is written', year:-1754},{label:'The life of the Buddha', year:-500},{label:'Construction of the Great Wall begins', year:-221},{label:'Julius Caesar is assassinated', year:-44}],\n       teach:'All four are BCE — most recent first means smallest BCE number at the top: 44 BCE → 221 BCE → 500 BCE → 1754 BCE.',\n       hint:'These are all BCE. The smallest BCE number is the most recent — closest to Year 1. Start there.'},\n      {kind:'order', id:'ord3', skill:'Sequencing',\n       prompt:'Arrange these from OLDEST (top) to MOST RECENT (bottom).',\n       items:[{label:'The Persian Wars begin in Greece', year:-499},{label:'Socrates is born in Athens', year:-469},{label:'The Parthenon is completed on the Acropolis', year:-432},{label:'Alexander the Great is born in Macedon', year:-356}],\n       teach:'All four are BCE, so the largest number is oldest: 499 BCE → 469 BCE → 432 BCE → 356 BCE.',\n       hint:'All dates are BCE — larger BCE number means older. Work from the biggest number down to the smallest.'},\n      {kind:'order', id:'ord4', skill:'Sequencing', reverse:true,\n       prompt:'Arrange these from MOST RECENT (top) to OLDEST (bottom).',\n       items:[{label:'The traditional birth of Jesus of Nazareth', year:1},{label:'Mount Vesuvius erupts, destroying Pompeii', year:79},{label:'Emperor Constantine issues the Edict of Milan', year:313},{label:'The Western Roman Empire falls', year:476}],\n       teach:'All four are CE — most recent first means largest CE number at the top: 476 CE → 313 CE → 79 CE → 1 CE.',\n       hint:'All dates are CE — the largest CE number is the most recent. Start with the year furthest from Year 1.'},\n\n      {kind:'caseIntro', num:'03', skill:'TimeCalc', title:'Mind the Gap', icon:'∆',\n       blurb:'A museum donor wants to know how much time separated key events. Calculate the gap in years.'},\n      {kind:'gap', id:'gap1', skill:'TimeCalc',\n       prompt:'How many years passed from the first Olympic Games (776 BCE) to the start of the Great Wall (221 BCE)?',\n       options:['555 years','997 years','221 years','776 years'], answer:0,\n       teach:'When BOTH dates are BCE, subtract the smaller from the larger: 776 − 221 = 555 years.',\n       hint:'Look at both dates carefully — are they on the same side of Year 1, or on opposite sides? That distinction matters for which operation to use.'},\n      {kind:'gap', id:'gap2', skill:'TimeCalc',\n       prompt:'How many years passed from the fall of Rome (476 CE) to Columbus reaching the Americas (1492 CE)?',\n       options:['1016 years','1968 years','916 years','2068 years'], answer:0,\n       teach:'When BOTH dates are CE, subtract the earlier from the later: 1492 − 476 = 1016 years.',\n       hint:'Think about two points sitting on the same side of a number line. What operation gives you the distance between them?'},\n      {kind:'gap', id:'gap3', skill:'TimeCalc',\n       prompt:'How many years passed from Julius Caesar’s death (44 BCE) to the eruption of Vesuvius at Pompeii (79 CE)?',\n       options:['123 years','35 years','44 years','79 years'], answer:0,\n       teach:'To cross from BCE to CE, ADD the two numbers: 44 + 79 = 123 years. (There is no year 0, so historians sometimes subtract 1 — but adding is the method to learn first.)',\n       hint:'One date is BCE and one is CE — they sit on opposite sides of Year 1. Does that change the operation you need compared to when both dates are on the same side?'},\n      {kind:'gap', id:'gap4', skill:'TimeCalc',\n       prompt:'How many years passed from the writing of Hammurabi\\'s Code (1754 BCE) to the traditional birth of the Buddha (500 BCE)?',\n       options:['1254 years','2254 years','754 years','1000 years'], answer:0,\n       teach:'When BOTH dates are BCE, subtract the smaller from the larger: 1754 − 500 = 1254 years.',\n       hint:'Both dates are BCE. Think about what you already know about finding the gap when both events sit on the same side of Year 1.'},\n      {kind:'gap', id:'gap5', skill:'TimeCalc',\n       prompt:'How many years passed from the fall of the Western Roman Empire (476 CE) to the Norman Conquest of England (1066 CE)?',\n       options:['590 years','1542 years','476 years','1066 years'], answer:0,\n       teach:'When BOTH dates are CE, subtract the earlier from the later: 1066 − 476 = 590 years.',\n       hint:'Both events are CE. What operation finds the distance between two points on the same side of Year 1?'},\n\n      {kind:'caseIntro', num:'04', skill:'SourceTypes', title:'Source or Story?', icon:'⌖',\n       blurb:'Every item is either a PRIMARY source (made by someone who was there) or a SECONDARY source (made later by someone studying it). Sort each one.'},\n      {kind:'sort', id:'srt1', skill:'SourceTypes',\n       prompt:'Label each source as Primary or Secondary.',\n       cards:[\n        {id:'a', label:'A soldier’s letter home', sub:'written from the battlefield during the war', answer:'primary'},\n        {id:'b', label:'A textbook chapter', sub:'about that same war, written in 2019', answer:'secondary'},\n        {id:'c', label:'A clay tablet receipt', sub:'recording a grain sale in ancient Sumer', answer:'primary'},\n        {id:'d', label:'A TV documentary', sub:'made last year about ancient Sumer', answer:'secondary'}],\n       teach:'PRIMARY sources are created by people who witnessed or took part in an event (letters, artifacts, photos). SECONDARY sources are made later by people studying it (textbooks, documentaries).',\n       hint:'Ask: was this made AT the time by someone there (primary), or LATER by someone studying it (secondary)?'},\n      {kind:'sort', id:'srt2', skill:'SourceTypes',\n       prompt:'Label each source as Primary or Secondary.',\n       cards:[\n        {id:'a', label:'A battlefield photograph', sub:'taken by a press photographer present during the battle', answer:'primary'},\n        {id:'b', label:'A museum exhibit label', sub:'written today to describe artifacts from that battle', answer:'secondary'},\n        {id:'c', label:'A ship captain\\'s log', sub:'recorded on board during a 15th-century voyage', answer:'primary'},\n        {id:'d', label:'A history podcast episode', sub:'produced last year discussing that same voyage', answer:'secondary'}],\n       teach:'A photograph and a captain\\'s log created at the time are primary sources. A museum label and a podcast made afterward are secondary sources.',\n       hint:'Was each source made by someone present at the event, or by someone studying it later?'},\n      {kind:'sort', id:'srt3', skill:'SourceTypes',\n       prompt:'Label each source as Primary or Secondary.',\n       cards:[\n        {id:'a', label:'An inscription carved in stone', sub:'at the site of an ancient ceremony by those who held it', answer:'primary'},\n        {id:'b', label:'A children\\'s book retelling', sub:'the same ceremony, published this year', answer:'secondary'},\n        {id:'c', label:'Official Roman tax records', sub:'created during the reign of Emperor Augustus', answer:'primary'},\n        {id:'d', label:'An encyclopedia article', sub:'summarising the history of Roman taxation', answer:'secondary'}],\n       teach:'Stone inscriptions and official records from the time are primary sources. Books and encyclopedias written afterward are secondary sources.',\n       hint:'Primary sources were made at the time by people involved. Secondary sources were made later by people studying the event.'},\n\n      {kind:'caseIntro', num:'05', skill:'Evidence', title:'Best Evidence', icon:'✦',\n       blurb:'Not every source is equally useful. For each claim, choose the source that gives the strongest, most reliable evidence.'},\n      {kind:'evidence', id:'ev1', skill:'Evidence',\n       claim:'CLAIM: “Pharaoh Khufu ordered the Great Pyramid to be built.”',\n       prompt:'Which source is MOST useful for testing this claim?',\n       options:['An inscription left by Khufu’s own officials at the site','A modern adventure novel set in ancient Egypt','A tourist’s selfie in front of the pyramid','A social-media post guessing it was aliens'], answer:0,\n       teach:'The most useful evidence is close to the event and reliable. An official inscription from Khufu’s time is a primary source created by people involved — far stronger than fiction, a selfie, or a guess.',\n       hint:'Look for the source closest to the event, made by people who were actually involved.'},\n      {kind:'evidence', id:'ev2', skill:'Evidence',\n       claim:'CLAIM: “Roman soldiers received a daily ration of grain.”',\n       prompt:'Which source is MOST useful?',\n       options:['A preserved Roman army supply record listing rations','A Hollywood film about gladiators','A painting of Rome made in the 1800s','A blog post with no sources listed'], answer:0,\n       teach:'A supply record kept by the Roman army is a primary source made for an official purpose — strong, direct evidence. Films, later paintings, and unsourced blogs are far less reliable.',\n       hint:'Which source was actually created by the Romans themselves for record-keeping?'},\n      {kind:'evidence', id:'ev4', skill:'Evidence',\n       claim:'CLAIM: \"The Black Death killed roughly one third of Europe\\'s population in the 1340s.\"',\n       prompt:'Which source is MOST useful for testing this claim?',\n       options:['Church burial records listing deaths by parish from 1347–1351','A novel set during the plague, published in 2005','A social media infographic about medieval diseases','A fantasy film loosely based on the Black Death'], answer:0,\n       teach:'Church burial records kept at the time are a primary source — they document actual deaths as they occurred. A novel, an infographic, and a film are secondary or fictional and cannot reliably prove the claim.',\n       hint:'Which source was actually created at the time, by people recording what was happening around them?'},\n      {kind:'evidence', id:'ev5', skill:'Evidence',\n       claim:'CLAIM: \"Gladiator fights were held inside the Colosseum in Rome.\"',\n       prompt:'Which source is MOST useful?',\n       options:['Ancient Roman inscriptions and gladiator contracts found at the Colosseum site','A modern Hollywood film about gladiators','A travel review of the Colosseum written last month','A quiz-show question about ancient Rome'], answer:0,\n       teach:'Inscriptions and contracts from ancient Rome are primary sources made by people directly involved — far stronger than a film, a travel review, or a quiz question.',\n       hint:'Which source was made by Romans themselves, at the time, for an official purpose?'},\n\n      {kind:'caseIntro', num:'06', skill:'Reasoning', title:'Crack the Case', icon:'★',\n       blurb:'Final case, detective. Two sources describe the same ancient flood. Weigh the evidence, then write your ruling.'},\n      {kind:'evidence', id:'ev3', skill:'Evidence',\n       claim:'THE CASE: A clay tablet written by a city scribe the year of a great flood, vs. an epic poem about the flood copied 800 years later.',\n       prompt:'Which is the stronger PRIMARY evidence for what happened that year?',\n       options:['The scribe’s clay tablet from the year of the flood','The epic poem copied 800 years later','Neither can tell us anything','They are equally reliable'], answer:0,\n       teach:'The scribe’s tablet is a primary source created at the time — the strongest evidence. The poem, copied centuries later, is secondary and may have changed in retelling.',\n       hint:'Which source was actually made AT the time of the flood?'},\n      {kind:'evidence', id:'ev6', skill:'Evidence',\n       claim:'CLAIM: \"The Persian army was defeated at the Battle of Marathon in 490 BCE.\"',\n       prompt:'Which source gives the strongest evidence?',\n       options:['An Athenian victory inscription erected on the battlefield in 490 BCE','A biography of the Athenian general written 400 years after the battle','A textbook chapter about the Persian Wars published in 2020','A YouTube documentary about ancient Greek warfare'], answer:0,\n       teach:'An inscription erected immediately after the battle is a primary source made by Athenians who were there — the most direct evidence. Biographies, textbooks, and documentaries produced long afterward are secondary sources.',\n       hint:'Which source was made closest to the event, by people who were actually present?'},\n      {kind:'evidence', id:'ev7', skill:'Evidence',\n       claim:'CLAIM: \"Cleopatra VII ruled Egypt from 51 BCE until her death in 30 BCE.\"',\n       prompt:'Which source is MOST useful for confirming these dates?',\n       options:['Egyptian royal decrees and coins bearing Cleopatra\\'s name and regnal dates','A Hollywood epic about Cleopatra from 1963','A modern romance novel set in ancient Egypt','A quiz show question about ancient rulers'], answer:0,\n       teach:'Official decrees and coins issued during Cleopatra\\'s reign are primary sources that directly record the dates of her rule. Films, novels, and quiz shows are secondary or fictional and unreliable for precise historical dating.',\n       hint:'Which source was made during her actual reign, for an official purpose, by people who lived at the time?'},\n      {kind:'written', id:'wr1', skill:'Reasoning',\n       prompt:'In 2–3 sentences, explain WHICH source you trust more about the flood and WHY. Use the words “primary,” “secondary,” or “evidence.”',\n       model:'I trust the scribe’s clay tablet more because it is a primary source — written the same year as the flood by someone who was there. The epic poem is a secondary source copied 800 years later, so it is weaker evidence and may have changed over time.',\n       teach:'Strong historical reasoning names the source, identifies it as primary or secondary, and explains why that makes the evidence more or less reliable.'}\n    ];\n\n    let cn='',ct='',ci='';\n    this.caseList=[];\n    for(const s of this.flow){\n      if(s.kind==='caseIntro'){ cn=s.num; ct=s.title; ci=s.icon; this.caseList.push({num:cn,title:ct,icon:ci}); s.caseLabel='Case '+cn; }\n      else { s.caseNum=cn; s.caseTitle=ct; s.caseIcon=ci; s.caseLabel='Case '+cn+' · '+ct; }\n    }\n    this.gradeables=this.flow.filter(s=>s.id);\n    this.maxScore=this.gradeables.length*100;\n    this.skillOrder=['Dating','Sequencing','TimeCalc','SourceTypes','Evidence','Reasoning'];\n    this.skillLabels={Dating:'BCE / CE Dating',Sequencing:'Chronological Order',TimeCalc:'Time Calculation',SourceTypes:'Primary vs. Secondary',Evidence:'Evaluating Evidence',Reasoning:'Historical Reasoning'};\n\n    this.state = {\n      screen:'intro', name:'', nameError:'', nameLocked:false,\n      stepIndex:0, pin:null, order:[], sort:{}, sortChecked:false,\n      mcWrong:[], mcOrder:[], solved:false,\n      written:'', writtenSubmitted:false, writtenRating:null,\n      attempts:{}, results:{}, feedback:null,\n      reduceMotion:false, largeText:false,\n      startTime:Date.now(), endTime:null\n    };\n  }\n\n  componentDidMount(){\n    try{ if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){ document.documentElement.dataset.reduce='true'; this.setState({reduceMotion:true}); } }catch(e){}\n    if(this.props.startInLargeText){ document.documentElement.dataset.large='true'; this.setState({largeText:true}); }\n  }\n\n  cur(){ return this.flow[this.state.stepIndex]; }\n  fmt(y){ if(y==null) return ''; if(y<0) return (-y)+' BCE'; if(y===0) return '1 CE'; return y+' CE'; }\n  pointsFor(a){ return a<=1?100:a===2?75:a===3?55:35; }\n  rankFor(ratio,done){ if(!done) return 'Cadet'; const p=ratio*100; if(p>=90)return 'Master Detective'; if(p>=78)return 'Senior Detective'; if(p>=65)return 'Field Detective'; if(p>=50)return 'Junior Archivist'; return 'Cadet'; }\n\n  shuffle(items,reverse){ let a=items.map(x=>x); for(let k=0;k<8;k++){ a=a.map(x=>x).sort(()=>Math.random()-0.5); const sorted=reverse?a.every((it,i)=>i===0||a[i-1].year>=it.year):a.every((it,i)=>i===0||a[i-1].year<=it.year); if(!sorted) break; } return a; }\n\n  setName(e){ this.setState({name:e.target.value, nameError:''}); }\n  beginGame(){ const n=(this.state.name||'').trim(); if(!n){ this.setState({nameError:'Please enter your name to begin.'}); return; } this.setState({screen:'play', nameLocked:true, nameError:'', startTime:Date.now()}, ()=>this.goTo(0)); }\n\n  goTo(idx){\n    const step=this.flow[idx];\n    const reset={ stepIndex:idx, feedback:null, solved:false, mcWrong:[], mcOrder:[], sortChecked:false, written:'', writtenSubmitted:false, writtenRating:null, pin:null, order:[], sort:{} };\n    if(step.kind==='numberline'){ reset.pin=null; }\n    if(step.kind==='gap'||step.kind==='evidence'){ reset.mcOrder=this.shuffleIdx(step.options.length); }\n    if(step.kind==='order'){ reset.order=this.shuffle(step.items,step.reverse); }\n    this.setState(reset);\n  }\n  continueStep(){ const ni=this.state.stepIndex+1; if(ni>=this.flow.length){ this.setState({screen:'results', endTime:Date.now()}); } else { this.goTo(ni); } }\n\n  recordSolve(step,a,title,body){\n    const st=this.state;\n    const attempts={...st.attempts,[step.id]:a};\n    const results={...st.results,[step.id]:{points:this.pointsFor(a),attempts:a,skill:step.skill,caseNum:step.caseNum}};\n    this.setState({attempts,results,solved:true,feedback:{correct:true,title,body}});\n  }\n\n  _pinFromX(clientX, rect, step){ const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width)); return Math.round((step.min+pct*(step.max-step.min))/5)*5; }\n  handleNLMouseDown(e){\n    e.preventDefault();\n    const step=this.cur(); const rect=e.currentTarget.getBoundingClientRect();\n    const update=(x)=>{ const year=this._pinFromX(x,rect,step); if(year!==this.state.pin) this.setState({pin:year,feedback:null}); };\n    update(e.clientX);\n    let raf=null;\n    const onMove=(ev)=>{ if(raf) cancelAnimationFrame(raf); raf=requestAnimationFrame(()=>update(ev.clientX)); };\n    const onUp=()=>{ if(raf) cancelAnimationFrame(raf); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };\n    document.addEventListener('mousemove',onMove);\n    document.addEventListener('mouseup',onUp);\n  }\n  handleNLTouch(e){\n    e.preventDefault();\n    const step=this.cur(); const rect=e.currentTarget.getBoundingClientRect();\n    const t=e.touches&&e.touches[0]?e.touches[0]:e.changedTouches&&e.changedTouches[0];\n    if(!t) return;\n    const year=this._pinFromX(t.clientX,rect,step);\n    if(year!==this.state.pin) this.setState({pin:year,feedback:null});\n  }\n  handleNLKey(e){ if(e.key==='ArrowLeft'||e.key==='ArrowRight'){ e.preventDefault(); if(this.state.pin===null) return; const step=this.cur(); const delta=e.key==='ArrowLeft'?-5:5; const pin=Math.max(step.min,Math.min(step.max,this.state.pin+delta)); this.setState({pin,feedback:null}); } }\n  checkNumberline(){\n    const step=this.cur(),st=this.state;\n    if(st.pin===null){ this.setState({feedback:{correct:false,title:'Drop your pin first.',body:'Click anywhere on the timeline to place your pin, then check it.'}}); return; }\n    const a=(st.attempts[step.id]||0)+1;\n    if(Math.abs(st.pin-step.target)<=step.tol){ this.recordSolve(step,a,'Placed correctly.',step.teach); }\n    else {\n      const wrongSide=(st.pin<0)!==(step.target<0);\n      const body=(wrongSide?'You are on the wrong side of the year-1 line. ':'')+step.hint+' '+step.teach;\n      this.setState({attempts:{...st.attempts,[step.id]:a}, feedback:{correct:false,title:'Not yet — adjust the pin.',body}});\n    }\n  }\n\n  moveOrder(i,dir){ const arr=[...this.state.order]; const j=i+dir; if(j<0||j>=arr.length)return; const t=arr[i]; arr[i]=arr[j]; arr[j]=t; this.setState({order:arr, feedback:null}); }\n  checkOrder(){\n    const step=this.cur(),st=this.state;\n    const a=(st.attempts[step.id]||0)+1;\n    const ok=step.reverse?st.order.every((it,i)=>i===0||st.order[i-1].year>=it.year):st.order.every((it,i)=>i===0||st.order[i-1].year<=it.year);\n    if(ok){ this.recordSolve(step,a,'Timeline restored.',step.teach); }\n    else { this.setState({attempts:{...st.attempts,[step.id]:a}, feedback:{correct:false,title:'Not in order yet.',body:step.hint+' '+step.teach}}); }\n  }\n\n  assignSort(id,bin){ this.setState({sort:{...this.state.sort,[id]:bin}, sortChecked:false, feedback:null}); }\n  checkSort(){\n    const step=this.cur(),st=this.state;\n    const all=step.cards.every(c=>st.sort[c.id]);\n    if(!all){ this.setState({feedback:{correct:false,title:'Label every source first.',body:'Give each source a Primary or Secondary label, then check.'}}); return; }\n    const a=(st.attempts[step.id]||0)+1;\n    const correct=step.cards.every(c=>st.sort[c.id]===c.answer);\n    if(correct){ const attempts={...st.attempts,[step.id]:a}; const results={...st.results,[step.id]:{points:this.pointsFor(a),attempts:a,skill:step.skill,caseNum:step.caseNum}}; this.setState({attempts,results,solved:true,sortChecked:true,feedback:{correct:true,title:'All correctly filed.',body:step.teach}}); }\n    else { this.setState({attempts:{...st.attempts,[step.id]:a}, sortChecked:true, feedback:{correct:false,title:'Some are misfiled.',body:step.hint+' '+step.teach}}); }\n  }\n\n  shuffleIdx(n){ const a=[]; for(let i=0;i<n;i++)a.push(i); for(let i=n-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }\n  correctDisplayIdx(step,st){ const order=(st.mcOrder&&st.mcOrder.length)?st.mcOrder:step.options.map((_,i)=>i); return order.indexOf(step.answer); }\n  pickMC(i){\n    const step=this.cur(),st=this.state;\n    if(st.solved) return;\n    const a=(st.attempts[step.id]||0)+1;\n    if(i===this.correctDisplayIdx(step,st)){ this.recordSolve(step,a,'Correct.',step.teach); }\n    else { const mcWrong=st.mcWrong.includes(i)?st.mcWrong:[...st.mcWrong,i]; this.setState({attempts:{...st.attempts,[step.id]:a}, mcWrong, feedback:{correct:false,title:'Not quite — try again.',body:step.hint}}); }\n  }\n\n  setWritten(e){ this.setState({written:e.target.value}); }\n  submitWritten(){ if((this.state.written||'').trim().length<12){ this.setState({feedback:{correct:false,title:'Write a little more.',body:'Give me 2–3 full sentences explaining your reasoning.'}}); return; } this.setState({writtenSubmitted:true, feedback:null}); }\n  rateWritten(level){ const step=this.cur(),st=this.state; const pts=level==='got'?100:level==='partly'?70:40; const results={...st.results,[step.id]:{points:pts,attempts:1,skill:step.skill,caseNum:step.caseNum}}; this.setState({results, writtenRating:level, solved:true, feedback:{correct:true,title:'Ruling recorded.',body:step.teach}}); }\n\n  restart(){ this.setState({screen:'intro', stepIndex:0, attempts:{}, results:{}, feedback:null, solved:false, nameLocked:false, written:'', writtenSubmitted:false, writtenRating:null}); }\n  toggleReduce(){ const v=!this.state.reduceMotion; document.documentElement.dataset.reduce=v?'true':'false'; this.setState({reduceMotion:v}); }\n  toggleLarge(){ const v=!this.state.largeText; document.documentElement.dataset.large=v?'true':'false'; this.setState({largeText:v}); }\n\n  // ---- style helpers (live state) ----\n  mcStyle(i,correctIdx,st){\n    const base='display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:15px 17px;border-radius:6px;font:500 16.5px/1.4 Archivo,sans-serif;cursor:pointer;transition:border-color .15s,background .15s;';\n    if(st.solved && i===correctIdx) return base+'border:1.5px solid #4f7a52;background:#e9f1e6;color:#2f5a36;font-weight:600;cursor:default;';\n    if(st.mcWrong.includes(i)) return base+'border:1.5px solid #c98a7d;background:#f6e8e3;color:#8a4034;cursor:not-allowed;opacity:.9;';\n    return base+'border:1.5px solid #ddd2b8;background:#fff;color:#23201a;';\n  }\n  mcMarkStyle(i,correctIdx,st){\n    const base='width:26px;height:26px;flex:none;border-radius:50%;display:flex;align-ite px Archivo,sans-serif;cursor:pointer;'; }\n\n  exportCSV(){\n    const st=this.state; const esc=v=>'\"'+String(v==null?'':v).replace(/\"/g,'\"\"')+'\"';\n    const earned=Object.values(st.results).reduce((s,r)=>s+r.points,0);\n    const pct=Math.round(earned/this.maxScore*100);\n    const rank=this.rankFor(earned/this.maxScore,this.gradeables.length);\n    const ms=(st.endTime||Date.now())-st.startTime; const tstr=Math.floor(ms/60000)+'m '+Math.floor(ms%60000/1000)+'s';\n    const head=['Student','Date','Rank','Score','MaxScore','Percent','TimeSpent'];\n    const row=[st.name,new Date().toLocaleString(),rank,earned,this.maxScore,pct+'%',tstr];\n    this.skillOrder.forEach(sk=>{ const tasks=this.gradeables.filter(g=>g.skill===sk); const pts=tasks.reduce((s,g)=>s+((st.results[g.id]||{}).points||0),0); const att=tasks.reduce((s,g)=>s+((st.results[g.id]||{}).attempts||0),0); const L=this.skillLabels[sk]; head.push(L+' Points',L+' Max',L+' Attempts'); row.push(pts,tasks.length*100,att); });\n    this.gradeables.forEach(g=>{ head.push(g.id+'_attempts'); row.push((st.results[g.id]||{}).attempts||0); });\n    head.push('WrittenResponse','WrittenSelfRating'); row.push(st.written||'', st.writtenRating||'');\n    const csv=[head.map(esc).join(','),row.map(esc).join(',')].join('\\n');\n    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob);\n    const a=document.createElement('a'); a.href=url; a.download='history-detective-'+(st.name||'student').replace(/[^a-z0-9]+/gi,'_').toLowerCase()+'.csv';\n    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);\n  }\n\n  renderVals(){\n    const st=this.state;\n    const academyName=this.props.academyName||'History Detective Academy';\n    const mentorName=this.props.mentorName||'Dr. Vale';\n    const showIntro=st.screen==='intro', showPlay=st.screen==='play', showResults=st.screen==='results';\n    const vm={\n      academyName, mentorName, mentorInitial:(mentorName.replace(/^(Dr\\.?|Mr\\.?|Ms\\.?|Mrs\\.?)\\s*/i,'')[0]||'V'),\n      showIntro, showPlay, showResults,\n      name:st.name, nameError:st.nameError, setName:e=>this.setName(e), beginGame:()=>this.beginGame(),\n      reduceMotion:st.reduceMotion, largeText:st.largeText,\n      toggleReduce:()=>this.toggleReduce(), toggleLarge:()=>this.toggleLarge(),\n      reduceLabel: st.reduceMotion?'Motion off':'Reduce motion',\n      largeLabel: st.largeText?'Large text on':'Large text',\n      reduceBtnStyle:this.accBtn(st.reduceMotion), largeBtnStyle:this.accBtn(st.largeText),\n      reduceMiniStyle:this.accMini(st.reduceMotion), largeMiniStyle:this.accMini(st.largeText),\n      restart:()=>this.restart(), exportCSV:()=>this.exportCSV()\n    };\n\n    if(showPlay){\n      const step=this.flow[st.stepIndex];\n      const isCaseIntro=step.kind==='caseIntro';\n      const isNumberline=step.kind==='numberline';\n      const isOrder=step.kind==='order';\n      const isMC=(step.kind==='gap'||step.kind==='evidence');\n      const isSort=step.kind==='sort';\n      const isWritten=step.kind==='written';\n      Object.assign(vm,{isCaseIntro,isNumberline,isOrder,isMC,isSort,isWritten});\n      vm.isCase01=isCaseIntro&&step.num==='01'; vm.isCase02=isCaseIntro&&step.num==='02'; vm.isCase03=isCaseIntro&&step.num==='03'; vm.isCase04=isCaseIntro&&step.num==='04'; vm.isCase05=isCaseIntro&&step.num==='05'; vm.isCase06=isCaseIntro&&step.num==='06';\n      vm.showTaskHeader=!isCaseIntro;\n\n      const done=Object.keys(st.results).length, total=this.gradeables.length;\n      vm.progressPct=Math.round(done/total*100)+'%';\n      vm.progressLabel='Evidence filed: '+done+' / '+total;\n      const earned=Object.values(st.results).reduce((s,r)=>s+r.points,0);\n      vm.scoreNow=earned;\n      vm.rankTitle=this.rankFor(done?earned/(done*100):0, done);\n      vm.caseLabel=step.caseLabel;\n\n      vm.ciNum=step.num; vm.ciTitle=step.title; vm.ciBlurb=step.blurb; vm.ciIcon=step.icon; vm.ciSkill=this.skillLabels[step.skill]||'';\n      vm.prompt=step.prompt; vm.claim=step.claim||''; vm.hasClaim=!!step.claim;\n\n      if(isNumberline){\n        vm.event=step.event; vm.eventYear=step.year;\n        vm.hasPin=st.pin!==null;\n        vm.pinLabel=st.pin===null?'Click timeline to place pin':this.fmt(st.pin);\n        vm.pinLabelColor=st.pin===null?'#c5b99a':'#a9772e';\n        const zPct=((0-step.min)/(step.max-step.min)*100);\n        vm.zeroPct=zPct+'%';\n        vm.leftLabel=this.fmt(step.min); vm.rightLabel=this.fmt(step.max);\n        vm.pinPct=st.pin===null?'-100%':((st.pin-step.min)/(step.max-step.min)*100)+'%';\n        vm.nlAriaLabel='Timeline from '+this.fmt(step.min)+' to '+this.fmt(step.max)+'. Click to place pin. Arrow keys nudge 50 years.';\n        vm.nlMouseDown=e=>this.handleNLMouseDown(e);\n        vm.nlTouchStart=e=>this.handleNLTouch(e);\n        vm.nlTouchMove=e=>this.handleNLTouch(e);\n        vm.nlKeyDown=e=>this.handleNLKey(e);\n        const nlTicks=[];\n        const _tlStep=100, _tlStart=Math.ceil(step.min/_tlStep)*_tlStep;\n        for(let y=_tlStart;y<=step.max;y+=_tlStep){\n          if(y===0) continue;\n          const p=((y-step.min)/(step.max-step.min)*100);\n          if(p<0.4||p>99.6) continue;\n          const isMajor=y%500===0;\n          const label=isMajor?(y<0?(-y)+' BCE':y+' CE'):'';\n          nlTicks.push({\n            wrapStyle:'position:absolute;left:'+p+'%;top:'+(isMajor?'36':'40')+'px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;',\n            lineStyle:'width:1px;height:'+(isMajor?'12':'5')+'px;background:'+(isMajor?'#c5b99a':'#d8cdb8')+';',\n            labelStyle:'font:700 8px Space Mono,monospace;color:#a9906a;margin-top:2px;white-space:nowrap;',\n            label\n          });\n        }\n        vm.nlTicks=nlTicks;\n      }\n\n      if(isOrder){\n        const last=st.order.length-1; const rowBase='display:flex;align-items:center;gap:13px;border-radius:6px;padding:13px 15px;margin-bottom:10px;border:1.5px solid ';\n        vm.orderItems=st.order.map((it,i)=>({ label:it.label, pos:(i+1)+'', isFirst:i===0, isLast:i===last, upDisabled:i===0, downDisabled:i===last, revealYear: this.fmt(it.year), up:()=>this.moveOrder(i,-1), down:()=>this.moveOrder(i,1), upStyle:this.iconBtnStyle(i===0), downStyle:this.iconBtnStyle(i===last), rowStyle: rowBase+(st.solved?'#a9c3a0;background:#eef4ea;':'#e2d8c0;background:#fff;') }));\n      }\n\n      if(isMC){ const order=(st.mcOrder&&st.mcOrder.length)?st.mcOrder:step.options.map((_,i)=>i); const correctIdx=order.indexOf(step.answer); vm.mcOptions=order.map((origIdx,i)=>({ label:step.options[origIdx], onClick:()=>this.pickMC(i), disabled: st.solved||st.mcWrong.includes(i), style:this.mcStyle(i,correctIdx,st), markStyle:this.mcMarkStyle(i,correctIdx,st), mark: (st.solved&&i===correctIdx)?'✓':(st.mcWrong.includes(i)?'✗':String.fromCharCode(65+i)) })); }\n\n      if(isSort){\n        vm.sortCards=step.cards.map(c=>{ const v=st.sort[c.id]; const wrong=st.sortChecked&&v&&v!==c.answer; const cardBase='display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-radius:7px;padding:14px 16px;border:1.5px solid ';\n          return { label:c.label, sub:c.sub, onPrimary:()=>this.assignSort(c.id,'primary'), onSecondary:()=>this.assignSort(c.id,'secondary'),\n            primaryStyle:this.binStyle(v==='primary', wrong&&v==='primary', st.solved&&c.answer==='primary'),\n            secondaryStyle:this.binStyle(v==='secondary', wrong&&v==='secondary', st.solved&&c.answer==='secondary'),\n            cardStyle: cardBase+(wrong?'#ddb6ab;background:#faf0ec;':(st.solved?'#a9c3a0;background:#eef4ea;':'#e2d8c0;background:#faf6ec;')),\n            markStyle:'width:20px;flex:none;font:700 14px Archivo,sans-serif;color:'+(st.solved?'#4f7a52':(wrong?'#9c3b2e':'transparent'))+';',\n            mark: st.solved?'✓':(wrong?'✗':'') }; });\n      }\n\n      if(isWritten){ vm.writtenValue=st.written; vm.setWritten=e=>this.setWritten(e); vm.writtenSubmitted=st.writtenSubmitted; vm.submitWritten=()=>this.submitWritten(); vm.writtenModel=step.model; vm.rateGot=()=>this.rateWritten('got'); vm.ratePartly=()=>this.rateWritten('partly'); vm.rateNot=()=>this.rateWritten('notyet'); vm.notRated=!st.writtenRating; vm.showWrittenSubmit=!st.writtenSubmitted; }\n\n      const fb=st.feedback;\n      vm.fbCorrect=!!(fb&&fb.correct); vm.fbWrong=!!(fb&&!fb.correct); vm.fbTitle=fb?fb.title:''; vm.fbBody=fb?fb.body:'';\n\n      vm.showContinue = isCaseIntro || st.solved;\n      vm.continueLabel = isCaseIntro?'Open the case ▸':'Continue ▸';\n      vm.continueStep = ()=>this.continueStep();\n      vm.showCheck = (isNumberline||isOrder||isSort) && !st.solved;\n      vm.checkHandler = isNumberline?(()=>this.checkNumberline()): isOrder?(()=>this.checkOrder()): (()=>this.checkSort());\n      vm.checkLabel = isNumberline?'Check placement': isOrder?'Check order':'Check sources';\n    }\n\n    if(showResults){\n      const earned=Object.values(st.results).reduce((s,r)=>s+r.points,0);\n      const pct=Math.round(earned/this.maxScore*100);\n      vm.studentName=st.name; vm.scoreNow=earned; vm.scoreMax=this.maxScore; vm.scorePct=pct+'%';\n      vm.rankTitle=this.rankFor(earned/this.maxScore, this.gradeables.length);\n      const ms=(st.endTime||Date.now())-st.startTime; vm.timeStr=Math.floor(ms/60000)+'m '+Math.floor(ms%60000/1000)+'s';\n      vm.skills=this.skillOrder.map(sk=>{ const tasks=this.gradeables.filter(g=>g.skill===sk); const pts=tasks.reduce((s,g)=>s+((st.results[g.id]||{}).points||0),0); const mx=tasks.length*100; return { label:this.skillLabels[sk], scoreStr:pts+' / '+mx, barWidth: Math.round(pts/Math.max(mx,1)*100)+'%' }; });\n      vm.badges=this.caseList.map(c=>{ const tasks=this.gradeables.filter(g=>g.caseNum===c.num); const atts=tasks.map(g=>(st.results[g.id]||{}).attempts||9); const avg=atts.reduce((a,b)=>a+b,0)/Math.max(atts.length,1); const tier=avg<=1.25?'Gold':avg<=2?'Silver':'Bronze'; return { title:c.title, icon:c.icon, tier, tierStyle:this.tierStyle(tier) }; });\n    }\n\n    return vm;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
